<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodScape | Digital Vibe Switcher</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Courier+Prime&family=Inter:wght@300;900&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
</head>
<body class="mood-focused">
    <div class="overlay"></div>
    
    <main class="content">
        <h1 id="mood-title">Stay Focused</h1>
        <p id="mood-desc">Deep work mode active. Minimal distractions.</p>

        <div class="button-group">
            <button onclick="setMood('focused')">Focused</button>
            <button onclick="setMood('hype')">Hype</button>
            <button onclick="setMood('chill')">Chill</button>
            <button onclick="setMood('sad')">Deep Blue</button>
        </div>

        <div class="video-container">
            <iframe id="playlist" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
